<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Gowtham</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #172026;
      background:
        radial-gradient(circle at top left, rgba(244, 181, 64, 0.28), transparent 34%),
        linear-gradient(135deg, #f6f2ea 0%, #dce8e4 48%, #f7efe4 100%);
    }

    main {
      width: min(90vw, 760px);
      padding: clamp(48px, 8vw, 88px) clamp(28px, 7vw, 76px);
      text-align: center;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 8px;
      box-shadow: 0 30px 90px rgba(35, 55, 55, 0.16);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin-bottom: 18px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #8b5f22;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 10vw, 6.5rem);
      font-weight: 500;
      line-height: 0.95;
      color: #172026;
    }

    .accent {
      display: block;
      margin-top: 20px;
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      color: #9f6a24;
    }

    .line {
      width: 90px;
      height: 3px;
      margin: 32px auto 0;
      background: #9f6a24;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main aria-label="Welcome message">
    <p class="eyebrow">A warm hello</p>
    <h1>welcome <span class="accent">Gowtham</span></h1>
    <div class="line" aria-hidden="true"></div>
  </main>
</body>
</html>
